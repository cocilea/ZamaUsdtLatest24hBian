<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZAMA/USDT · 15分钟价格点阵图</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
      width: 100%;
      max-width: 1200px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #e6edf3;
    }

    header p {
      font-size: 0.875rem;
      color: #8b949e;
      margin-top: 6px;
    }

    /* ── Info bar: clock + live price ──────────────────────────────────────── */
    #info-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      flex-wrap: wrap;
      margin-top: 12px;
      padding: 10px 20px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      font-size: 0.9rem;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 7px;
      color: #8b949e;
    }

    .info-item .value {
      font-weight: 600;
      font-size: 1rem;
      color: #e6edf3;
      font-variant-numeric: tabular-nums;
    }

    .info-item .value.up   { color: #3fb950; }
    .info-item .value.down { color: #f85149; }

    /* ── Chart wrapper ─────────────────────────────────────────────────────── */
    #chart-wrapper {
      width: 100%;
      max-width: 1200px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    #interactive-chart {
      width: 100%;
      height: 780px;
    }

    #loading-msg {
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: #8b949e;
      padding: 20px 0;
    }

    #loading-msg.visible { display: flex; }

    /* ── Controls ──────────────────────────────────────────────────────────── */
    .controls {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      background: #21262d;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 18px;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    button:hover  { background: #30363d; border-color: #8b949e; }
    button:active { background: #3d444d; }

    .auto-refresh-label {
      font-size: 0.875rem;
      color: #8b949e;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .auto-refresh-label input[type="checkbox"] {
      accent-color: #3fb950;
      width: 15px;
      height: 15px;
      cursor: pointer;
    }

    select {
      background: #21262d;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 0.875rem;
      cursor: pointer;
    }

    .vol-size-label {
      font-size: 0.875rem;
      color: #8b949e;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #vol-height-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 110px;
      height: 4px;
      border-radius: 2px;
      background: #30363d;
      outline: none;
      cursor: pointer;
    }

    #vol-height-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #3fb950;
      cursor: pointer;
    }

    #vol-height-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #3fb950;
      cursor: pointer;
      border: none;
    }

    #status-bar {
      font-size: 0.8rem;
      color: #8b949e;
    }

    #status-bar span { color: #3fb950; }
  </style>
</head>
<body>
  <header>
    <h1>ZAMA/USDT &nbsp;·&nbsp; 近24小时 15分钟价格变化点阵图</h1>
    <p>数据源：币安（Binance）实时行情</p>

    <div id="info-bar">
      <div class="info-item">
        🕐 当前时间 (UTC+8)：<span class="value" id="current-time">--:--:--</span>
      </div>
      <div class="info-item">
        💰 ZAMA/USDT 实时价格：<span class="value" id="live-price">加载中…</span>
      </div>
    </div>
  </header>

  <div id="chart-wrapper">
    <div id="loading-msg" class="visible">正在加载最新图表…</div>
    <div id="interactive-chart"></div>

    <div class="controls">
      <button id="refresh-btn">🔄 立即刷新</button>

      <label class="auto-refresh-label">
        <input type="checkbox" id="auto-refresh-chk" />
        自动刷新
      </label>

      <select id="interval-select">
        <option value="60">每 1 分钟</option>
        <option value="120">每 2 分钟</option>
        <option value="300" selected>每 5 分钟</option>
        <option value="900">每 15 分钟</option>
      </select>

      <label class="vol-size-label">
        📊 成交量高度：
        <input type="range" id="vol-height-slider" min="8" max="30" value="15" step="1" />
        <span id="vol-height-val">15%</span>
      </label>
    </div>

    <div id="status-bar">上次更新：<span id="last-updated">—</span></div>
  </div>

  <!-- ECharts 5 (local copy; CDN alternative: https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js) -->
  <script src="/static/echarts.min.js"></script>

  <script>
    /* ── UTC+8 clock ───────────────────────────────────────────────────────── */
    function utc8Now() {
      return new Date(Date.now() + 8 * 3600 * 1000);
    }

    function updateClock() {
      const d = utc8Now();
      document.getElementById("current-time").textContent =
        d.toISOString().slice(11, 19);
    }
    setInterval(updateClock, 1000);
    updateClock();

    /* ── Live price ────────────────────────────────────────────────────────── */
    let _lastPrice = null;

    async function updateLivePrice() {
      try {
        const res = await fetch("/price");
        const { price } = await res.json();
        const el = document.getElementById("live-price");
        el.textContent = price.toFixed(6) + " USDT";
        if (_lastPrice !== null) {
          el.className = "value " + (price >= _lastPrice ? "up" : "down");
        } else {
          el.className = "value";
        }
        _lastPrice = price;
      } catch (e) {
        console.warn("Price fetch failed:", e);
      }
    }
    updateLivePrice();
    setInterval(updateLivePrice, 15000);

    /* ── ECharts setup ─────────────────────────────────────────────────────── */
    var chart = echarts.init(document.getElementById("interactive-chart"), null,
                             { renderer: "canvas" });
    var _chartData = null;
    var _volHeight = 15;   // percentage height of the volume panel (8–30)

    function formatVol(v) {
      if (v >= 1e6) return (v / 1e6).toFixed(2) + "M";
      if (v >= 1e3) return (v / 1e3).toFixed(1) + "K";
      return v.toFixed(0);
    }

    /* ── Compute 4-panel grid positions ───────────────────────────────────── */
    /*  Panels (bottom → top): volume · priceChange · priceLine · dotMatrix   */
    /*  Each panel has a GAP_PCT % gap above it.  Outer margins: top/bot 4 %. */
    var GRID_LEFT  = "9%";
    var GRID_RIGHT = "5%";
    function computeGrids(volH) {
      var GAP_PCT    = 3;   // percentage gap between panels
      var OUTER_BOT  = 4;   // bottom outer margin (%)
      var PC_HEIGHT  = 13;  // fixed height of price-change % panel (%)
      var PL_HEIGHT  = 13;  // fixed height of price-line panel (%)
      var bVol = OUTER_BOT;
      var tVol  = bVol  + volH;           // bottom of next panel
      var bPc   = tVol  + GAP_PCT;
      var tPc   = bPc   + PC_HEIGHT;
      var bPl   = tPc   + GAP_PCT;
      var tPl   = bPl   + PL_HEIGHT;
      var bDot  = tPl   + GAP_PCT;
      // dot matrix top = 4% from top of chart
      return [
        /* 0 dot matrix */  { left: GRID_LEFT, right: GRID_RIGHT, top: "4%",              bottom: bDot + "%" },
        /* 1 price line */  { left: GRID_LEFT, right: GRID_RIGHT, top: (100-tPl) + "%",   bottom: bPl  + "%" },
        /* 2 pct change */  { left: GRID_LEFT, right: GRID_RIGHT, top: (100-tPc) + "%",   bottom: bPc  + "%" },
        /* 3 volume     */  { left: GRID_LEFT, right: GRID_RIGHT, top: (100-tVol) + "%",  bottom: bVol + "%" },
      ];
    }

    /* Build the full ECharts option from raw JSON data */
    function buildOption(data) {
      const { times, ohlcv, pct_changes, dot_matrix } = data;
      const { matrix, y_ticks, n_rows, vmax } = dot_matrix;
      const n = times.length;

      /* ── Dot-matrix scatter data ── */
      const bgDots  = [];   // background (dim) dots
      const posDots = [];   // lit green dots (price rose)
      const negDots = [];   // lit red  dots (price fell)

      for (let col = 0; col < n; col++) {
        for (let row = 0; row < n_rows; row++) {
          const val = matrix[row][col];
          if (val === 0) {
            bgDots.push([col, row]);
          } else {
            const intensity = Math.min(Math.abs(val) / vmax, 1.0);
            if (val > 0) posDots.push([col, row, val, intensity]);
            else         negDots.push([col, row, val, intensity]);
          }
        }
      }

      /* ── Close-price line data ── */
      const lineData = ohlcv.map(([o, h, l, c]) => c);

      /* ── Price-change % bar data ── */
      const pctBarData = pct_changes.map((pct) => ({
        value: pct,
        itemStyle: { color: pct >= 0 ? "#3fb950" : "#f85149" },
      }));

      /* ── Volume bars with per-bar colour ── */
      const volData = ohlcv.map(([o, h, l, c, v]) => ({
        value: v,
        itemStyle: { color: c >= o ? "#3fb950" : "#f85149" },
      }));

      /* ── X-axis label: show HH:MM every 4th candle ── */
      const xAxisConf = (gi) => ({
        gridIndex: gi,
        type: "category",
        data: Array.from({ length: n }, (_, i) => i),
        axisLabel: {
          color: "#aab4c4",
          fontSize: 8,
          rotate: 45,
          interval: 3,
          formatter: (val) => {
            const i = parseInt(val);
            return (i >= 0 && i < times.length) ? times[i].slice(11, 16) : "";
          },
        },
        axisLine:   { lineStyle: { color: "#2a3a4a" } },
        splitLine:  { show: false },
        axisTick:   { show: false },
      });

      /* ── Y-axis tick step (same logic as matplotlib) ── */
      const yStep = Math.max(1, Math.floor(n_rows / 10));

      const grids = computeGrids(_volHeight);

      return {
        backgroundColor: "#0d1117",
        animation: false,

        /* ── Unified crosshair across all four grids ── */
        axisPointer: {
          link: [{ xAxisIndex: "all" }],
          label: {
            backgroundColor: "#21262d",
            color: "#e6edf3",
            fontSize: 11,
          },
        },

        /* ── Tooltip ── */
        tooltip: {
          trigger: "axis",
          axisPointer: {
            type: "cross",
            crossStyle: { color: "#4a5a6a", width: 1 },
          },
          backgroundColor: "rgba(13,17,23,0.95)",
          borderColor: "#30363d",
          borderWidth: 1,
          padding: 0,
          formatter: function (params) {
            if (!params || params.length === 0) return "";

            /* Determine the column index reliably from any series */
            let colIdx = null;
            for (const p of params) {
              if (p.seriesType === "line" || p.seriesType === "bar") {
                colIdx = p.dataIndex;
                break;
              }
              if (p.seriesType === "scatter" && Array.isArray(p.value)) {
                const v = parseInt(p.value[0]);
                if (!isNaN(v)) { colIdx = v; break; }
              }
            }
            if (colIdx === null) {
              const ax = parseInt(params[0].axisValue ?? params[0].name);
              if (!isNaN(ax)) colIdx = ax;
            }
            if (colIdx === null || colIdx < 0 || colIdx >= n) return "";

            const time = times[colIdx];
            const pct  = pct_changes[colIdx];
            const [o, h, l, c, v] = ohlcv[colIdx];
            const dir   = c >= o ? "up" : "down";
            const clr   = dir === "up" ? "#3fb950" : "#f85149";
            const arrow = dir === "up" ? "▲" : "▼";
            const sign  = pct >= 0 ? "+" : "";

            return (
              `<div style="padding:8px 14px;font-size:12px;line-height:2;min-width:200px">` +
              `<div style="color:#8b949e;border-bottom:1px solid #30363d;margin-bottom:5px;padding-bottom:4px">` +
              `⏰ ${time} (CST/UTC+8)</div>` +
              `<div>开盘 <b style="float:right;color:${clr}">${o.toFixed(6)}</b></div>` +
              `<div>最高 <b style="float:right;color:#3fb950">${h.toFixed(6)}</b></div>` +
              `<div>最低 <b style="float:right;color:#f85149">${l.toFixed(6)}</b></div>` +
              `<div>收盘 <b style="float:right;color:${clr}">${c.toFixed(6)}</b></div>` +
              `<div>涨跌幅 <b style="float:right;color:${clr}">${arrow} ${sign}${pct.toFixed(3)}%</b></div>` +
              `<div style="color:#8b949e">成交量 <b style="float:right;color:#e6edf3">${formatVol(v)}</b></div>` +
              `</div>`
            );
          },
        },

        /* ── Four stacked grids ── */
        grid: grids,

        xAxis: [xAxisConf(0), xAxisConf(1), xAxisConf(2), xAxisConf(3)],

        yAxis: [
          /* Dot-matrix Y: numeric row indices, labelled with pct values */
          {
            gridIndex: 0,
            type: "value",
            min: -0.5,
            max: n_rows - 0.5,
            axisLabel: {
              color: "#aab4c4",
              fontSize: 8,
              formatter: (val) => {
                const i = Math.round(val);
                if (i >= 0 && i < n_rows && i % yStep === 0)
                  return y_ticks[i].toFixed(2) + "%";
                return "";
              },
            },
            axisLine:  { lineStyle: { color: "#2a3a4a" } },
            splitLine: { lineStyle: { color: "#1a2535" } },
            axisTick:  { show: false },
            name: "涨跌幅",
            nameTextStyle: { color: "#8b949e", fontSize: 8 },
          },
          /* Price line Y */
          {
            gridIndex: 1,
            axisLabel: {
              color: "#aab4c4",
              fontSize: 8,
              formatter: (v) => v.toFixed(4),
            },
            axisLine:  { lineStyle: { color: "#2a3a4a" } },
            splitLine: { lineStyle: { color: "#1a2535" } },
            name: "价格",
            nameTextStyle: { color: "#8b949e", fontSize: 8 },
          },
          /* Price-change % Y */
          {
            gridIndex: 2,
            axisLabel: {
              color: "#aab4c4",
              fontSize: 8,
              formatter: (v) => v.toFixed(2) + "%",
            },
            axisLine:  { lineStyle: { color: "#2a3a4a" } },
            splitLine: { lineStyle: { color: "#1a2535" } },
            name: "涨跌%",
            nameTextStyle: { color: "#8b949e", fontSize: 8 },
          },
          /* Volume Y */
          {
            gridIndex: 3,
            axisLabel: {
              color: "#aab4c4",
              fontSize: 8,
              formatter: formatVol,
            },
            axisLine:  { lineStyle: { color: "#2a3a4a" } },
            splitLine: { lineStyle: { color: "#1a2535" } },
            name: "成交量",
            nameTextStyle: { color: "#8b949e", fontSize: 8 },
          },
        ],

        series: [
          /* ── Background (dim) dots ── */
          {
            name: "背景",
            type: "scatter",
            xAxisIndex: 0,
            yAxisIndex: 0,
            data: bgDots,
            symbolSize: 6,
            itemStyle: { color: "#1e2a38", opacity: 0.9 },
            silent: true,
            tooltip: { show: false },
          },

          /* ── Positive (green) lit dots ── */
          {
            name: "上涨",
            type: "scatter",
            xAxisIndex: 0,
            yAxisIndex: 0,
            data: posDots,
            symbolSize: 10,
            itemStyle: {
              color: (p) => {
                const t = p.data[3];
                const g = Math.round(63 + 192 * t);
                return `rgba(${Math.round(30 + 20*t)},${g},${Math.round(60 + 20*t)},1)`;
              },
            },
          },

          /* ── Negative (red) lit dots ── */
          {
            name: "下跌",
            type: "scatter",
            xAxisIndex: 0,
            yAxisIndex: 0,
            data: negDots,
            symbolSize: 10,
            itemStyle: {
              color: (p) => {
                const t = p.data[3];
                const r = Math.round(100 + 155 * t);
                return `rgba(${r},${Math.round(30 + 20*t)},${Math.round(50 + 20*t)},1)`;
              },
            },
          },

          /* ── Close-price line chart ── */
          {
            name: "收盘价",
            type: "line",
            xAxisIndex: 1,
            yAxisIndex: 1,
            data: lineData,
            symbol: "none",
            lineStyle: { color: "#58a6ff", width: 1.5 },
            areaStyle: { color: "rgba(31,111,235,0.12)" },
            smooth: false,
          },

          /* ── Price-change % bars ── */
          {
            name: "涨跌幅",
            type: "bar",
            xAxisIndex: 2,
            yAxisIndex: 2,
            data: pctBarData,
            barMaxWidth: 10,
          },

          /* ── Volume bars ── */
          {
            name: "成交量",
            type: "bar",
            xAxisIndex: 3,
            yAxisIndex: 3,
            data: volData,
            barMaxWidth: 10,
          },
        ],
      };
    }

    /* ── Load chart data and render ─────────────────────────────────────────── */
    async function loadChartData() {
      const btn = document.getElementById("refresh-btn");
      const msg = document.getElementById("loading-msg");
      btn.disabled = true;
      msg.classList.add("visible");

      try {
        const res = await fetch("/chart-data?_t=" + Date.now());
        _chartData = await res.json();
        chart.setOption(buildOption(_chartData), true);

        const now = utc8Now();
        document.getElementById("last-updated").textContent =
          now.toISOString().slice(11, 19) + " (UTC+8)";
      } catch (e) {
        console.error("Chart data load failed:", e);
        alert("图表加载失败，请检查网络连接或稍后重试。");
      } finally {
        btn.disabled = false;
        msg.classList.remove("visible");
      }
    }

    /* ── Auto-refresh controls ──────────────────────────────────────────────── */
    let autoTimer = null;

    function startAutoRefresh() {
      const secs = parseInt(document.getElementById("interval-select").value, 10);
      stopAutoRefresh();
      autoTimer = setInterval(loadChartData, secs * 1000);
    }

    function stopAutoRefresh() {
      if (autoTimer !== null) { clearInterval(autoTimer); autoTimer = null; }
    }

    document.getElementById("refresh-btn").addEventListener("click", loadChartData);

    document.getElementById("auto-refresh-chk").addEventListener("change", function () {
      this.checked ? startAutoRefresh() : stopAutoRefresh();
    });

    document.getElementById("interval-select").addEventListener("change", function () {
      if (document.getElementById("auto-refresh-chk").checked) startAutoRefresh();
    });

    /* ── Volume height slider ───────────────────────────────────────────────── */
    document.getElementById("vol-height-slider").addEventListener("input", function () {
      _volHeight = parseInt(this.value, 10);
      document.getElementById("vol-height-val").textContent = _volHeight + "%";
      if (_chartData) {
        chart.setOption(buildOption(_chartData), true);
      }
    });

    /* Responsive resize */
    window.addEventListener("resize", () => chart && chart.resize());

    /* Initial load */
    loadChartData();
  </script>
</body>
</html>
